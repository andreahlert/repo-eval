# repo-eval checklist for Flyte SDK 2.0
package_name: flyte
python_version: "3.12"

steps:
  - id: setup
    name: "Installation"
    module: repo_eval.steps.setup
    params:
      max_total_packages: 80
      max_import_time_ms: 500

  - id: first_contact
    name: "Hello World (README)"
    module: repo_eval.steps.first_contact
    params:
      readme_url: "https://raw.githubusercontent.com/flyteorg/flyte-sdk/main/README.md"

  - id: cli
    name: "CLI Usage"
    module: repo_eval.steps.cli_test
    params:
      commands:
        - "{package} --version"
        - "{package} --help"

  - id: deps
    name: "Dependencies & Weight"
    module: repo_eval.steps.deps
    params:
      max_direct_deps: 15
      max_total_packages: 80

report:
  title: "Flyte SDK 2.0 Adoption Barrier Analysis"
  accent_color: "#7652a2"
  logo_url: "https://raw.githubusercontent.com/flyteorg/static-resources/main/common/flyte_circle_gradient_1_4x4.png"
